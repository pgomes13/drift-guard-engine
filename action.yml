name: drift-guard
description: Detect breaking API changes between the current branch and the base branch.
author: pgomes13

inputs:
  node-version:
    description: Node.js version to use for generating the OpenAPI spec.
    required: false
    default: "20"
  upload-diff:
    description: Upload the JSON diff as an artifact named drift-guard-diff for downstream impact checks.
    required: false
    default: "false"
  notify-consumers:
    description: Comma-separated list of consumer repos to notify via repository_dispatch (e.g. "org/service-b,org/service-c").
    required: false
    default: ""
  notify-token:
    description: GitHub token with repo write access to consumer repos. Required when notify-consumers is set.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - uses: pgomes13/drift-guard-engine/action/setup-deps@v1
      with:
        node-version: ${{ inputs.node-version }}

    - uses: pgomes13/drift-guard-engine/action/setup-database@v1

    - uses: pgomes13/drift-guard-engine/action/install-binary@v1

    - uses: pgomes13/drift-guard-engine/action/compare@v1
      with:
        upload-diff: ${{ inputs.upload-diff }}
        notify-consumers: ${{ inputs.notify-consumers }}
        notify-token: ${{ inputs.notify-token }}

    - uses: pgomes13/drift-guard-engine/action/update-pages@v1

branding:
  icon: shield
  color: blue
