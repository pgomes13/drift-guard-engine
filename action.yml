name: drift-guard
description: Detect breaking API changes between the current branch and the base branch.
author: pgomes13

inputs:
  node-version:
    description: Node.js version to use for generating the OpenAPI spec.
    required: false
    default: "20"

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm

    - name: Install project dependencies
      shell: bash
      run: npm ci

    - name: Install drift-guard
      shell: bash
      run: |
        LATEST=$(curl -s https://api.github.com/repos/pgomes13/drift-guard-engine/releases/latest | jq -r '.tag_name')
        curl -sSL "https://github.com/pgomes13/drift-guard-engine/releases/download/${LATEST}/drift-guard_Linux_x86_64.tar.gz" | tar -xz
        sudo mv drift-guard /usr/local/bin/drift-guard

    - name: Run API drift comparison
      id: drift
      shell: bash
      run: |
        set +e
        printf 'y\ny\ny\n' | drift-guard compare --format text > /tmp/drift-output.txt 2>&1
        if [ -s /tmp/drift-output.txt ]; then
          echo "has_changes=true" >> $GITHUB_OUTPUT
        else
          echo "has_changes=false" >> $GITHUB_OUTPUT
        fi

    - name: Comment on PR
      if: github.event_name == 'pull_request' && steps.drift.outputs.has_changes == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh pr comment "${{ github.event.pull_request.number }}" \
          --repo "${{ github.repository }}" \
          --body "## Drift Guard Report

        $(cat /tmp/drift-output.txt)"

branding:
  icon: shield
  color: blue
