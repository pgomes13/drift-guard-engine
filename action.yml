name: drift-guard
description: Detect breaking API changes between the current branch and the base branch.
author: pgomes13

inputs:
  node-version:
    description: Node.js version to use for generating the OpenAPI spec.
    required: false
    default: "20"

runs:
  using: composite
  steps:
    - uses: ./action/setup-deps
      with:
        node-version: ${{ inputs.node-version }}

    - uses: ./action/setup-database

    - uses: ./action/install-binary

    - uses: ./action/compare

branding:
  icon: shield
  color: blue
