name: drift-guard
description: Detect breaking API changes between the current branch and the base branch.
author: pgomes13

inputs:
  node-version:
    description: Node.js version to use for generating the OpenAPI spec.
    required: false
    default: "20"

runs:
  using: composite
  steps:
    - name: Detect package manager
      id: pm
      shell: bash
      run: |
        PKG_MANAGER_FIELD=$(node -p "require('./package.json').packageManager" 2>/dev/null || true)
        if [ -f "pnpm-lock.yaml" ]; then
          echo "manager=pnpm" >> $GITHUB_OUTPUT
          echo "cache=pnpm" >> $GITHUB_OUTPUT
          PNPM_VERSION=$(echo "$PKG_MANAGER_FIELD" | grep -oE 'pnpm@[0-9]+\.[0-9]+\.[0-9]+' | cut -d@ -f2 || true)
          echo "pnpm-version=${PNPM_VERSION:-latest}" >> $GITHUB_OUTPUT
        elif [ -f "yarn.lock" ]; then
          echo "manager=yarn" >> $GITHUB_OUTPUT
          echo "cache=yarn" >> $GITHUB_OUTPUT
          YARN_VERSION=$(echo "$PKG_MANAGER_FIELD" | grep -oE 'yarn@[0-9]+\.[0-9]+\.[0-9]+' | cut -d@ -f2 || true)
          echo "yarn-version=${YARN_VERSION:-classic}" >> $GITHUB_OUTPUT
        else
          echo "manager=npm" >> $GITHUB_OUTPUT
          echo "cache=npm" >> $GITHUB_OUTPUT
          NPM_VERSION=$(node -p "require('./package.json').engines && require('./package.json').engines.npm" 2>/dev/null | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' || true)
          echo "npm-version=${NPM_VERSION}" >> $GITHUB_OUTPUT
        fi

    - name: Set up pnpm
      if: steps.pm.outputs.manager == 'pnpm'
      uses: pnpm/action-setup@v4
      with:
        version: ${{ steps.pm.outputs.pnpm-version }}

    - name: Set up yarn
      if: steps.pm.outputs.manager == 'yarn'
      shell: bash
      run: |
        YARN_VERSION="${{ steps.pm.outputs.yarn-version }}"
        if [ "$YARN_VERSION" = "classic" ] || [[ "$YARN_VERSION" == 1.* ]]; then
          npm install -g yarn@"${YARN_VERSION/classic/}"
        else
          corepack enable
          corepack prepare yarn@"$YARN_VERSION" --activate
        fi

    - name: Set up npm
      if: steps.pm.outputs.manager == 'npm' && steps.pm.outputs.npm-version != ''
      shell: bash
      run: npm install -g npm@${{ steps.pm.outputs.npm-version }}

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: ${{ steps.pm.outputs.cache }}

    - name: Install project dependencies
      shell: bash
      run: |
        if [ "${{ steps.pm.outputs.manager }}" = "pnpm" ]; then
          pnpm install --frozen-lockfile
        elif [ "${{ steps.pm.outputs.manager }}" = "yarn" ]; then
          yarn install --frozen-lockfile
        else
          npm ci
        fi

    - name: Start database service (if needed)
      shell: bash
      run: |
        pkg=$(cat package.json 2>/dev/null || echo '{}')

        has_pg() {
          echo "$pkg" | node -e "
            const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            const all={...(d.dependencies||{}), ...(d.devDependencies||{})};
            process.exit(('pg' in all||'typeorm' in all||'@prisma/client' in all||'sequelize' in all)?0:1);
          " 2>/dev/null
        }

        has_mongo() {
          echo "$pkg" | node -e "
            const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            const all={...(d.dependencies||{}), ...(d.devDependencies||{})};
            process.exit(('mongoose' in all||'mongodb' in all)?0:1);
          " 2>/dev/null
        }

        if has_pg && [ -z "${DATABASE_HOST:-}${DATABASE_URL:-}${PGHOST:-}" ]; then
          echo "Detected postgres dependency — starting container..."
          docker run -d \
            --name dg-postgres \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_DB=postgres \
            -p 5432:5432 \
            postgres:16-alpine
          until docker exec dg-postgres pg_isready -U postgres 2>/dev/null; do sleep 1; done
          {
            echo "DATABASE_HOST=localhost"
            echo "DATABASE_PORT=5432"
            echo "DATABASE_USER=postgres"
            echo "DATABASE_PASSWORD=postgres"
            echo "DATABASE_NAME=postgres"
            echo "PGHOST=localhost"
            echo "PGPORT=5432"
            echo "PGUSER=postgres"
            echo "PGPASSWORD=postgres"
            echo "PGDATABASE=postgres"
          } >> $GITHUB_ENV
        fi

        if has_mongo && [ -z "${MONGODB_URI:-}${MONGO_URI:-}${MONGO_URL:-}" ]; then
          echo "Detected mongodb dependency — starting container..."
          docker run -d \
            --name dg-mongo \
            -p 27017:27017 \
            mongo:7
          until docker exec dg-mongo mongosh --eval "db.adminCommand('ping')" 2>/dev/null; do sleep 2; done
          {
            echo "MONGODB_URI=mongodb://localhost:27017/drift_guard"
            echo "MONGO_URI=mongodb://localhost:27017/drift_guard"
            echo "MONGO_URL=mongodb://localhost:27017/drift_guard"
          } >> $GITHUB_ENV
        fi

    - name: Install drift-guard
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh release download --repo pgomes13/drift-guard-engine --pattern "drift-guard_*_linux_amd64.tar.gz"
        tar -xzf drift-guard_*_linux_amd64.tar.gz
        sudo mv drift-guard /usr/local/bin/drift-guard

    - name: Run API drift comparison
      id: drift
      shell: bash
      run: |
        set +e
        printf 'y\ny\ny\n' | drift-guard compare --format markdown > /tmp/drift-output.txt 2>/dev/null
        DRIFT_EXIT=$?
        if [ $DRIFT_EXIT -eq 0 ] && [ -s /tmp/drift-output.txt ]; then
          echo "has_changes=true" >> $GITHUB_OUTPUT
        else
          echo "has_changes=false" >> $GITHUB_OUTPUT
          if [ $DRIFT_EXIT -ne 0 ]; then
            echo "::warning::drift-guard failed to generate the API spec. See logs for details."
          fi
        fi

    - name: Comment on PR
      if: github.event_name == 'pull_request' && steps.drift.outputs.has_changes == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        # Delete any existing Drift Guard comment on this PR.
        gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
          --paginate --jq '.[] | select(.body | startswith("## Drift Guard Report")) | .id' \
          | xargs -I{} gh api --method DELETE "repos/${{ github.repository }}/issues/comments/{}" || true

        BODY="$(printf '## Drift Guard Report\n\n'; cat /tmp/drift-output.txt)"
        gh api \
          --method POST \
          "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
          -f body="$BODY"

branding:
  icon: shield
  color: blue
