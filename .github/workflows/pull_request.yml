name: PR

on:
  pull_request:

permissions:
  pull-requests: write

jobs:
  pr-description:
    name: Update PR Description
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build PR description from commits
        id: build_desc
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          # Collect commit subjects between base and head as bullet points
          BULLETS=$(git log "$BASE".."$HEAD" --pretty=format:"- %s" --reverse)

          # Escape for GitHub Actions multiline output
          EOF=$(openssl rand -hex 8)
          echo "body<<$EOF" >> "$GITHUB_OUTPUT"
          echo "## What's changed" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo "$BULLETS" >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"

      - name: Update PR description
        uses: actions/github-script@v7
        with:
          script: |
            const body = `${{ steps.build_desc.outputs.body }}`;
            const existing = context.payload.pull_request.body || '';

            // Only update if the PR body is empty or already managed by this workflow
            if (existing === '' || existing.startsWith('## What\'s changed')) {
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                body,
              });
            }
