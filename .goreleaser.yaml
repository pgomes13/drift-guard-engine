version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: drift-guard
    main: ./cmd/drift-guard
    binary: drift-guard
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: drift-guard
    name_template: "drift-guard_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

release:
  replace_existing_artifacts: true

brews:
  - name: drift-guard
    repository:
      owner: pgomes13
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/pgomes13/api-drift-engine"
    description: "Schema diff engine that detects breaking vs. non-breaking API contract changes across OpenAPI, GraphQL, and gRPC schemas."
    license: "MIT"
    install: |
      bin.install "drift-guard"
    test: |
      system "#{bin}/drift-guard", "--help"
