version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: driftabot
    main: ./cmd/driftabot
    binary: driftabot
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: driftabot
    name_template: "driftabot_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

release:
  replace_existing_artifacts: true

brews:
  - name: driftabot
    repository:
      owner: DriftaBot
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/DriftaBot/cli"
    description: "Schema diff engine that detects breaking vs. non-breaking API contract changes across OpenAPI, GraphQL, and gRPC schemas."
    license: "MIT"
    install: |
      bin.install "driftabot"
    test: |
      system "#{bin}/driftabot", "--help"
