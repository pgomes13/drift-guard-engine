name: Install drift-guard binary
description: Downloads and installs the latest drift-guard release binary.

runs:
  using: composite
  steps:
    - name: Install drift-guard
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh release download --repo pgomes13/drift-guard-engine --pattern "drift-guard_*_linux_amd64.tar.gz"
        tar -xzf drift-guard_*_linux_amd64.tar.gz
        sudo mv drift-guard /usr/local/bin/drift-guard
