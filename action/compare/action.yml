name: Run drift comparison and comment
description: Runs drift-guard compare and posts a PR comment when API changes are detected.

inputs:
  upload-diff:
    description: Upload the JSON diff as a GitHub Actions artifact (drift-guard-diff) for consumer impact checks.
    required: false
    default: "false"
  notify-consumers:
    description: Comma-separated list of repos to notify via repository_dispatch (e.g. "org/service-b,org/service-c").
    required: false
    default: ""
  notify-token:
    description: GitHub token with repo write access to the consumer repos (required when notify-consumers is set).
    required: false
    default: ""
  service-url:
    description: Override the Drift Guard service URL (advanced use only).
    required: false
    default: ""
  project-token:
    description: Token used to authenticate with the Drift Guard service.
    required: false
    default: ${{ github.token }}

outputs:
  drift-status:
    description: "Result of drift analysis: no_drift, drift_detected, auto_accepted, or error"
    value: ${{ steps.connected.outputs.drift_status || steps.drift.outputs.drift_status }}
  check-run-id:
    description: "GitHub Check Run ID created by the service (connected mode only)"
    value: ${{ steps.connected.outputs.check_run_id }}
  report-url:
    description: "URL to the drift report in the portal (connected mode only)"
    value: ${{ steps.connected.outputs.report_url }}

runs:
  using: composite
  steps:

    # ── CONNECTED MODE (paid) ─────────────────────────────────────────────────
    # Always attempted on pull_request events. The service auto-detects whether
    # the Drift Guard GitHub App is installed on the repo (via App JWT lookup).
    # Returns 404 if not installed → falls back to standalone mode.

    - name: Delegate analysis to Drift Guard service
      id: connected
      if: github.event_name == 'pull_request'
      shell: bash
      env:
        SERVICE_URL: ${{ inputs.service-url != '' && inputs.service-url || 'https://api.driftguard.com.au' }}
        PROJECT_TOKEN: ${{ inputs.project-token }}
        OWNER: ${{ github.repository_owner }}
        REPO: ${{ github.event.repository.name }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        BASE_SHA: ${{ github.event.pull_request.base.sha }}
      run: |
        RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
          -H "Authorization: Bearer $PROJECT_TOKEN" \
          -H "Content-Type: application/json" \
          -H "Accept: application/json" \
          "$SERVICE_URL/drift/$OWNER/$REPO/pulls/$PR_NUMBER/analyze" \
          -d "{\"headSha\":\"$HEAD_SHA\",\"baseSha\":\"$BASE_SHA\"}")

        HTTP_CODE=$(echo "$RESPONSE" | tail -1)
        BODY=$(echo "$RESPONSE" | head -n -1)

        if [ "$HTTP_CODE" -ne 202 ]; then
          echo "::debug::Drift Guard service returned HTTP $HTTP_CODE. Falling back to standalone mode."
          echo "drift_status=error" >> $GITHUB_OUTPUT
          exit 0
        fi

        STATUS=$(echo "$BODY" | grep -o '"status":"[^"]*"' | cut -d'"' -f4)
        CHECK_RUN_ID=$(echo "$BODY" | grep -o '"checkRunId":[0-9]*' | cut -d':' -f2)
        REPORT_URL=$(echo "$BODY" | grep -o '"reportUrl":"[^"]*"' | cut -d'"' -f4)

        echo "drift_status=$STATUS" >> $GITHUB_OUTPUT
        echo "check_run_id=$CHECK_RUN_ID" >> $GITHUB_OUTPUT
        echo "report_url=$REPORT_URL" >> $GITHUB_OUTPUT

        echo "Drift Guard service response: status=$STATUS checkRunId=$CHECK_RUN_ID"
        echo "Review URL: $REPORT_URL"

        # Exit 1 if drift requires human review (mirrors Chromatic CLI exit code 1)
        if [ "$STATUS" = "pending" ]; then
          echo "::warning::API drift detected and requires review. Visit $REPORT_URL to approve or reject."
          exit 1
        fi

    # ── STANDALONE MODE (free / fallback) ────────────────────────────────────
    # Runs the drift-guard binary locally and posts a PR comment + Check Run
    # directly using GITHUB_TOKEN. No service required.

    - name: Run API drift comparison (standalone)
      id: drift
      if: steps.connected.outputs.drift_status == 'error' || github.event_name != 'pull_request'
      shell: bash
      run: |
        set +e
        printf 'y\ny\ny\n' | drift-guard compare --format markdown > /tmp/drift-output.txt 2>/dev/null
        DRIFT_EXIT=$?
        if [ $DRIFT_EXIT -eq 0 ] && [ -s /tmp/drift-output.txt ]; then
          echo "has_changes=true" >> $GITHUB_OUTPUT
          echo "drift_status=drift_detected" >> $GITHUB_OUTPUT
        else
          echo "has_changes=false" >> $GITHUB_OUTPUT
          echo "drift_status=no_drift" >> $GITHUB_OUTPUT
          if [ $DRIFT_EXIT -ne 0 ]; then
            echo "::warning::drift-guard failed to generate the API spec. See logs for details."
          fi
        fi

    - name: Post GitHub Check Run (standalone)
      if: steps.connected.outputs.drift_status == 'error' && github.event_name == 'pull_request'
      uses: pgomes13/drift-guard-engine/action/check-run@v1
      with:
        head-sha: ${{ github.event.pull_request.head.sha }}
        conclusion: ${{ steps.drift.outputs.has_changes == 'true' && 'failure' || 'success' }}
        title: ${{ steps.drift.outputs.has_changes == 'true' && 'API drift detected' || 'No API drift detected' }}
        summary-file: /tmp/drift-output.txt

    - name: Generate JSON diff
      if: steps.connected.outputs.drift_status == 'error' && (inputs.upload-diff == 'true' || inputs.notify-consumers != '')
      shell: bash
      run: |
        set +e
        printf 'y\ny\ny\n' | drift-guard compare --format json > /tmp/drift-diff.json 2>/dev/null || echo '{}' > /tmp/drift-diff.json

    - name: Upload diff artifact
      if: inputs.upload-diff == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: drift-guard-diff
        path: /tmp/drift-diff.json
        retention-days: 7

    - name: Notify consumer repos
      if: inputs.notify-consumers != ''
      shell: bash
      env:
        NOTIFY_TOKEN: ${{ inputs.notify-token }}
        CONSUMERS: ${{ inputs.notify-consumers }}
        PROVIDER_REPO: ${{ github.repository }}
        PROVIDER_RUN_ID: ${{ github.run_id }}
      run: |
        DIFF_JSON=$(cat /tmp/drift-diff.json 2>/dev/null || echo '{}')
        IFS=',' read -ra REPOS <<< "$CONSUMERS"
        for repo in "${REPOS[@]}"; do
          repo=$(echo "$repo" | xargs)
          echo "Notifying $repo..."
          curl -s -X POST \
            -H "Authorization: Bearer $NOTIFY_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$repo/dispatches" \
            -d "{\"event_type\":\"drift-guard-impact\",\"client_payload\":{\"provider_repo\":\"$PROVIDER_REPO\",\"run_id\":\"$PROVIDER_RUN_ID\",\"diff\":$DIFF_JSON}}"
        done

    - name: Delete previous Drift Guard comment
      if: steps.connected.outputs.drift_status == 'error' && github.event_name == 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
          --paginate --jq '.[] | select(.body | startswith("## Drift Guard Report")) | .id' \
          | xargs -I{} gh api --method DELETE "repos/${{ github.repository }}/issues/comments/{}" || true

    - name: Comment on PR (standalone)
      if: steps.connected.outputs.drift_status == 'error' && github.event_name == 'pull_request' && steps.drift.outputs.has_changes == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        OWNER=$(printf '%s' "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
        REPO_NAME=$(printf '%s' "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
        PAGES_URL="https://${OWNER}.github.io/${REPO_NAME}/"
        BODY="$(printf '## Drift Guard Report\n\n'; cat /tmp/drift-output.txt; printf '\n\n---\n[View full drift log](%s)' "$PAGES_URL")"
        gh api \
          --method POST \
          "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
          -f body="$BODY"
