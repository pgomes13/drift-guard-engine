name: Run drift comparison and comment
description: Runs drift-guard compare and posts a PR comment when API changes are detected.

inputs:
  upload-diff:
    description: Upload the JSON diff as a GitHub Actions artifact (drift-guard-diff) for consumer impact checks.
    required: false
    default: "false"
  notify-consumers:
    description: Comma-separated list of repos to notify via repository_dispatch (e.g. "org/service-b,org/service-c").
    required: false
    default: ""
  notify-token:
    description: GitHub token with repo write access to the consumer repos (required when notify-consumers is set).
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Run API drift comparison
      id: drift
      shell: bash
      run: |
        set +e
        printf 'y\ny\ny\n' | drift-guard compare --format markdown > /tmp/drift-output.txt 2>/dev/null
        DRIFT_EXIT=$?
        if [ $DRIFT_EXIT -eq 0 ] && [ -s /tmp/drift-output.txt ]; then
          echo "has_changes=true" >> $GITHUB_OUTPUT
        else
          echo "has_changes=false" >> $GITHUB_OUTPUT
          if [ $DRIFT_EXIT -ne 0 ]; then
            echo "::warning::drift-guard failed to generate the API spec. See logs for details."
          fi
        fi

    - name: Generate JSON diff
      if: inputs.upload-diff == 'true' || inputs.notify-consumers != ''
      shell: bash
      run: |
        set +e
        printf 'y\ny\ny\n' | drift-guard compare --format json > /tmp/drift-diff.json 2>/dev/null || echo '{}' > /tmp/drift-diff.json

    - name: Upload diff artifact
      if: inputs.upload-diff == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: drift-guard-diff
        path: /tmp/drift-diff.json
        retention-days: 7

    - name: Notify consumer repos
      if: inputs.notify-consumers != ''
      shell: bash
      env:
        NOTIFY_TOKEN: ${{ inputs.notify-token }}
        CONSUMERS: ${{ inputs.notify-consumers }}
        PROVIDER_REPO: ${{ github.repository }}
        PROVIDER_RUN_ID: ${{ github.run_id }}
      run: |
        DIFF_JSON=$(cat /tmp/drift-diff.json)
        IFS=',' read -ra REPOS <<< "$CONSUMERS"
        for repo in "${REPOS[@]}"; do
          repo=$(echo "$repo" | xargs)
          echo "Notifying $repo..."
          curl -s -X POST \
            -H "Authorization: Bearer $NOTIFY_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$repo/dispatches" \
            -d "{\"event_type\":\"drift-guard-impact\",\"client_payload\":{\"provider_repo\":\"$PROVIDER_REPO\",\"run_id\":\"$PROVIDER_RUN_ID\",\"diff\":$DIFF_JSON}}"
        done

    - name: Delete previous Drift Guard comment
      if: github.event_name == 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
          --paginate --jq '.[] | select(.body | startswith("## Drift Guard Report")) | .id' \
          | xargs -I{} gh api --method DELETE "repos/${{ github.repository }}/issues/comments/{}" || true

    - name: Comment on PR
      if: github.event_name == 'pull_request' && steps.drift.outputs.has_changes == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        OWNER=$(printf '%s' "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
        REPO_NAME=$(printf '%s' "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
        PAGES_URL="https://${OWNER}.github.io/${REPO_NAME}/"
        BODY="$(printf '## Drift Guard Report\n\n'; cat /tmp/drift-output.txt; printf '\n\n---\n[View full drift log](%s)' "$PAGES_URL")"
        gh api \
          --method POST \
          "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
          -f body="$BODY"
