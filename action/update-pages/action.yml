name: Update drift log on GitHub Pages
description: Creates and updates a GitHub Pages site with a log of API drift checks.

runs:
  using: composite
  steps:
    - name: Update drift log
      if: github.event_name == 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        REPO="${{ github.repository }}"
        PR_NUMBER="${{ github.event.pull_request.number }}"
        PR_URL="${{ github.event.pull_request.html_url }}"
        TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')

        # Detect configured Pages branch; fall back to gh-pages.
        if ! PAGES_BRANCH=$(gh api "repos/${REPO}/pages" --jq '.source.branch' 2>/dev/null); then
          PAGES_BRANCH="gh-pages"
        fi

        # Build the entry body.
        if [ -s /tmp/drift-output.txt ]; then
          CHANGES="$(cat /tmp/drift-output.txt)"
          ESCAPED=$(printf '%s' "$CHANGES" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')
          BODY=$(printf '<pre>%s</pre>' "$ESCAPED")
        else
          BODY='<p class="no-drift">No API changes detected.</p>'
        fi

        ENTRY=$(printf '<div class="entry"><div class="entry-header"><a href="%s">PR #%s</a><span class="entry-time">%s</span></div><div class="entry-body">%s</div></div>' \
          "$PR_URL" "$PR_NUMBER" "$TIMESTAMP" "$BODY")

        CSS='*{box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;max-width:960px;margin:48px auto;padding:0 24px;color:#24292e}h1{font-size:1.5rem;border-bottom:1px solid #e1e4e8;padding-bottom:12px;margin-bottom:24px}.entry{border:1px solid #e1e4e8;border-radius:6px;margin-bottom:20px;overflow:hidden}.entry-header{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;background:#f6f8fa;border-bottom:1px solid #e1e4e8}.entry-header a{font-weight:600;color:#0366d6;text-decoration:none}.entry-time{color:#6a737d;font-size:.85rem}.entry-body{padding:16px}pre{margin:0;font-size:.82rem;white-space:pre-wrap;word-break:break-word}.no-drift{color:#6a737d;font-style:italic}'

        # Fetch existing index.html or seed with template.
        if gh api "repos/${REPO}/contents/index.html?ref=${PAGES_BRANCH}" > /tmp/pages-file.json 2>/dev/null; then
          FILE_SHA=$(jq -r '.sha' /tmp/pages-file.json)
          OLD_HTML=$(jq -r '.content' /tmp/pages-file.json | tr -d '\n' | base64 -d)
          BEFORE=$(printf '%s' "$OLD_HTML" | sed -n '0,/<!-- ENTRIES -->/p')
          AFTER=$(printf '%s' "$OLD_HTML" | sed -n '/<!-- ENTRIES -->/,${/<!-- ENTRIES -->/d;p}')
          NEW_HTML=$(printf '%s\n%s\n%s' "$BEFORE" "$ENTRY" "$AFTER")
        else
          FILE_SHA=""
          PAGE_HEADER=$(printf '<!DOCTYPE html>\n<html lang="en">\n<head>\n<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width,initial-scale=1.0">\n<title>API Drift Log</title>\n<style>%s</style>\n</head>\n<body>\n<h1>API Drift Log</h1>\n<!-- ENTRIES -->' "$CSS")
          NEW_HTML=$(printf '%s\n%s\n</body>\n</html>' "$PAGE_HEADER" "$ENTRY")
        fi

        ENCODED=$(printf '%s' "$NEW_HTML" | base64 -w 0)

        PUT_ARGS=(
          --method PUT
          "repos/${REPO}/contents/index.html"
          -f "message=chore: update drift log"
          -f "content=${ENCODED}"
          -f "branch=${PAGES_BRANCH}"
        )
        [ -n "$FILE_SHA" ] && PUT_ARGS+=(-f "sha=${FILE_SHA}")

        gh api "${PUT_ARGS[@]}" || true
