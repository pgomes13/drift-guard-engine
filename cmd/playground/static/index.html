<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>drift-guard playground</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --border: #334155;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --breaking: #ef4444;
      --breaking-bg: #450a0a;
      --nonbreaking: #f59e0b;
      --nonbreaking-bg: #451a03;
      --info: #22c55e;
      --info-bg: #052e16;
      --radius: 8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── Header ────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-wrap: wrap;
      gap: 12px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    .logo span { color: var(--accent); }
    .logo small {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      background: var(--border);
      padding: 2px 8px;
      border-radius: 99px;
      margin-left: 4px;
    }
    .tabs {
      display: flex;
      gap: 4px;
      background: var(--bg);
      border-radius: var(--radius);
      padding: 4px;
    }
    .tab {
      padding: 7px 18px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.15s;
    }
    .tab:hover { color: var(--text); background: var(--border); }
    .tab.active { background: var(--accent); color: white; }

    /* ── Main layout ───────────────────────────────────── */
    main { padding: 24px; max-width: 1400px; margin: 0 auto; }

    .editors-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }
    @media (max-width: 768px) { .editors-row { grid-template-columns: 1fr; } }

    .editor-panel {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .editor-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
    }
    .editor-label span {
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0;
      font-size: 11px;
    }

    /* CodeMirror host */
    .cm-host {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      height: 380px;
    }
    .cm-host .cm-editor {
      height: 100%;
      font-size: 13px;
    }
    .cm-host .cm-scroller { overflow: auto; }

    /* Fallback textarea (shown if CodeMirror fails) */
    textarea.editor-fallback {
      width: 100%;
      height: 380px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 13px;
      padding: 12px;
      resize: vertical;
      line-height: 1.6;
      outline: none;
    }
    textarea.editor-fallback:focus { border-color: var(--accent); }

    /* ── Action bar ────────────────────────────────────── */
    .action-bar {
      display: flex;
      justify-content: center;
      margin-bottom: 24px;
    }
    #compare-btn {
      padding: 11px 40px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      min-width: 160px;
    }
    #compare-btn:hover:not(:disabled) { background: var(--accent-hover); }
    #compare-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    #compare-btn .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error banner ──────────────────────────────────── */
    #error-banner {
      background: var(--breaking-bg);
      border: 1px solid var(--breaking);
      border-radius: var(--radius);
      padding: 12px 16px;
      margin-bottom: 16px;
      color: var(--breaking);
      font-size: 13px;
      font-family: monospace;
      white-space: pre-wrap;
    }

    /* ── Results ───────────────────────────────────────── */
    #results { animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; } }

    .summary-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .summary-bar h2 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-muted);
      margin-right: 4px;
    }
    .pill {
      padding: 4px 12px;
      border-radius: 99px;
      font-size: 12px;
      font-weight: 600;
    }
    .pill-total    { background: var(--border);       color: var(--text); }
    .pill-breaking { background: var(--breaking-bg);  color: var(--breaking); border: 1px solid var(--breaking); }
    .pill-non      { background: var(--nonbreaking-bg); color: var(--nonbreaking); border: 1px solid var(--nonbreaking); }
    .pill-info     { background: var(--info-bg);      color: var(--info); border: 1px solid var(--info); }

    .no-changes {
      text-align: center;
      padding: 48px 0;
      color: var(--info);
      font-size: 16px;
      font-weight: 500;
    }
    .no-changes::before { content: "✓  "; }

    .changes-table-wrap {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    thead th {
      background: var(--surface);
      padding: 10px 14px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
    }
    tbody tr { border-bottom: 1px solid var(--border); }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.02); }
    td {
      padding: 10px 14px;
      vertical-align: top;
      color: var(--text);
    }
    .severity-badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
    }
    .sev-breaking    { background: var(--breaking-bg);    color: var(--breaking);    border: 1px solid var(--breaking); }
    .sev-non-breaking { background: var(--nonbreaking-bg); color: var(--nonbreaking); border: 1px solid var(--nonbreaking); }
    .sev-info        { background: var(--info-bg);        color: var(--info);        border: 1px solid var(--info); }

    .td-type    { font-family: monospace; color: var(--text-muted); white-space: nowrap; }
    .td-path    { font-family: monospace; font-weight: 500; white-space: nowrap; }
    .td-method  { font-family: monospace; font-size: 11px; font-weight: 700; }
    .td-desc    { color: var(--text); line-height: 1.5; }
    .td-before-after { font-family: monospace; font-size: 12px; color: var(--text-muted); }

    .row-breaking    { border-left: 3px solid var(--breaking); }
    .row-non-breaking { border-left: 3px solid var(--nonbreaking); }
    .row-info        { border-left: 3px solid var(--info); }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <span>drift-guard</span> playground
    <small>beta</small>
  </div>
  <div class="tabs" role="tablist">
    <button class="tab active" data-type="openapi">OpenAPI</button>
    <button class="tab"        data-type="graphql">GraphQL</button>
    <button class="tab"        data-type="grpc">gRPC / Protobuf</button>
  </div>
</header>

<main>
  <div class="editors-row">
    <div class="editor-panel">
      <div class="editor-label">Base Schema <span>— current / stable version</span></div>
      <div id="base-cm" class="cm-host"></div>
      <textarea id="base-ta" class="editor-fallback" style="display:none" spellcheck="false"></textarea>
    </div>
    <div class="editor-panel">
      <div class="editor-label">Head Schema <span>— new / proposed version</span></div>
      <div id="head-cm" class="cm-host"></div>
      <textarea id="head-ta" class="editor-fallback" style="display:none" spellcheck="false"></textarea>
    </div>
  </div>

  <div class="action-bar">
    <button id="compare-btn">Compare</button>
  </div>

  <div id="error-banner" hidden></div>
  <div id="results" hidden></div>
</main>

<script type="module">
// ── Sample data ──────────────────────────────────────────────────────────────

const SAMPLES = {
  openapi: {
    base: `openapi: "3.0.0"
info:
  title: Users API
  version: "1.0.0"
paths:
  /users:
    get:
      operationId: listUsers
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                  total:
                    type: integer
    post:
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
              properties:
                name:
                  type: string
                email:
                  type: string
      responses:
        "201":
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  email:
                    type: string
  /users/{id}:
    get:
      operationId: getUser
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  email:
                    type: string
    delete:
      operationId: deleteUser
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204": {}`,
    head: `openapi: "3.0.0"
info:
  title: Users API
  version: "2.0.0"
paths:
  /users:
    get:
      operationId: listUsers
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                  # 'total' removed
    post:
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
              properties:
                name:
                  type: string
                email:
                  type: string
                role:
                  type: string
      responses:
        "201":
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  email:
                    type: string
  /users/{id}:
    get:
      operationId: getUser
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  email:
                    type: string
    # DELETE /users/{id} removed
  /posts:
    get:
      operationId: listPosts
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array`,
  },

  graphql: {
    base: `type Query {
  user(id: ID!): User
  users(limit: Int, offset: Int): [User!]!
  search(query: String!): SearchResult
}

type Mutation {
  createUser(input: CreateUserInput!): User!
  updateUser(id: ID!, input: UpdateUserInput!): User!
  deleteUser(id: ID!): Boolean!
}

type User {
  id: ID!
  email: String!
  name: String
  role: UserRole!
  address: Address
}

type Address {
  street: String!
  city: String!
  country: String!
}

enum UserRole {
  ADMIN
  VIEWER
  EDITOR
}

input CreateUserInput {
  email: String!
  name: String
  role: UserRole
}

input UpdateUserInput {
  name: String
  role: UserRole
}

union SearchResult = User | Address

interface Node {
  id: ID!
}`,
    head: `type Query {
  user(id: ID!, includeDeleted: Boolean): User
  users(limit: Int, offset: Int): [User!]!
  search(query: String!, type: String): SearchResult
}

type Mutation {
  createUser(input: CreateUserInput!): User!
  updateUser(id: ID!, input: UpdateUserInput!): User!
  # deleteUser removed
}

type User {
  id: ID!
  email: String!
  name: String
  role: UserRole!
  # address removed
  createdAt: String
}

type Address {
  street: String!
  city: String!
  country: String!
  postcode: String
}

enum UserRole {
  ADMIN
  VIEWER
  # EDITOR removed
}

input CreateUserInput {
  email: String!
  name: String
  role: UserRole!
}

input UpdateUserInput {
  name: String
  role: UserRole
  notes: String
}

type Post {
  id: ID!
  title: String!
}

union SearchResult = User | Address | Post

interface Node {
  id: ID!
}`,
  },

  grpc: {
    base: `syntax = "proto3";

package users.v1;

service UserService {
  rpc GetUser (GetUserRequest) returns (GetUserResponse);
  rpc ListUsers (ListUsersRequest) returns (stream ListUsersResponse);
  rpc DeleteUser (DeleteUserRequest) returns (DeleteUserResponse);
}

message GetUserRequest {
  string id = 1;
}

message GetUserResponse {
  string id    = 1;
  string name  = 2;
  string email = 3;
}

message ListUsersRequest {
  int32 page      = 1;
  int32 page_size = 2;
}

message ListUsersResponse {
  repeated GetUserResponse users = 1;
  int32 total                   = 2;
}

message DeleteUserRequest {
  string id = 1;
}

message DeleteUserResponse {
  bool success = 1;
}`,
    head: `syntax = "proto3";

package users.v1;

service UserService {
  rpc GetUser (GetUserRequestV2) returns (GetUserResponse);
  rpc ListUsers (stream ListUsersRequest) returns (stream ListUsersResponse);
  // DeleteUser removed
  rpc CreateUser (CreateUserRequest) returns (CreateUserResponse);
}

service AdminService {
  rpc BanUser (BanUserRequest) returns (BanUserResponse);
}

message GetUserRequestV2 {
  string id     = 1;
  string locale = 2;
}

message GetUserResponse {
  string id   = 1;
  string name = 2;
  // email removed
  string role = 4;
}

message ListUsersRequest {
  int32 page      = 1;
  int32 page_size = 2;
}

message ListUsersResponse {
  repeated GetUserResponse users = 1;
  // total removed
}

message CreateUserRequest {
  string name  = 1;
  string email = 2;
}

message CreateUserResponse {
  string id = 1;
}

message BanUserRequest {
  string user_id = 1;
}

message BanUserResponse {
  bool success = 1;
}`,
  },
};

// ── State ────────────────────────────────────────────────────────────────────

let currentType = 'openapi';
let baseView = null;
let headView = null;
let usingFallback = false;

// ── CodeMirror setup ─────────────────────────────────────────────────────────

async function initEditors(type) {
  try {
    const [
      { basicSetup, EditorView },
      { EditorState },
      { oneDark },
    ] = await Promise.all([
      import('https://esm.sh/codemirror@6.0.1'),
      import('https://esm.sh/@codemirror/state@6.4.1'),
      import('https://esm.sh/@codemirror/theme-one-dark@6.1.2'),
    ]);

    let langExt = [];
    try {
      if (type === 'graphql') {
        const { graphql } = await import('https://esm.sh/cm6-graphql@0.0.12');
        langExt = [graphql()];
      } else if (type === 'openapi') {
        const { yaml } = await import('https://esm.sh/@codemirror/lang-yaml@6.1.1');
        langExt = [yaml()];
      }
      // grpc/proto: no lightweight ESM extension, basic editor is fine
    } catch (_) { /* language extension failed, proceed without */ }

    const makeState = (doc) => EditorState.create({
      doc,
      extensions: [basicSetup, oneDark, ...langExt],
    });

    const baseHost = document.getElementById('base-cm');
    const headHost = document.getElementById('head-cm');

    if (baseView) baseView.destroy();
    if (headView) headView.destroy();

    baseView = new EditorView({ state: makeState(SAMPLES[type].base), parent: baseHost });
    headView = new EditorView({ state: makeState(SAMPLES[type].head), parent: headHost });

    usingFallback = false;
    document.getElementById('base-cm').style.display = '';
    document.getElementById('head-cm').style.display = '';
    document.getElementById('base-ta').style.display = 'none';
    document.getElementById('head-ta').style.display = 'none';
  } catch (err) {
    // CDN unavailable — fall back to textareas
    usingFallback = true;
    document.getElementById('base-cm').style.display = 'none';
    document.getElementById('head-cm').style.display = 'none';
    const baseTa = document.getElementById('base-ta');
    const headTa = document.getElementById('head-ta');
    baseTa.style.display = '';
    headTa.style.display = '';
    baseTa.value = SAMPLES[type].base;
    headTa.value = SAMPLES[type].head;
  }
}

function getEditorContent(which) {
  if (usingFallback) {
    return document.getElementById(which === 'base' ? 'base-ta' : 'head-ta').value;
  }
  const view = which === 'base' ? baseView : headView;
  return view ? view.state.doc.toString() : '';
}

function setEditorContent(which, content) {
  if (usingFallback) {
    document.getElementById(which === 'base' ? 'base-ta' : 'head-ta').value = content;
    return;
  }
  const view = which === 'base' ? baseView : headView;
  if (!view) return;
  view.dispatch({ changes: { from: 0, to: view.state.doc.length, insert: content } });
}

// ── Tab switching ────────────────────────────────────────────────────────────

document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', async () => {
    currentType = btn.dataset.type;
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    await initEditors(currentType);
    clearResults();
  });
});

// ── Compare ──────────────────────────────────────────────────────────────────

const compareBtn = document.getElementById('compare-btn');
const errorBanner = document.getElementById('error-banner');
const resultsEl = document.getElementById('results');

function clearResults() {
  resultsEl.hidden = true;
  resultsEl.innerHTML = '';
  errorBanner.hidden = true;
  errorBanner.textContent = '';
}

compareBtn.addEventListener('click', async () => {
  clearResults();
  compareBtn.disabled = true;
  compareBtn.innerHTML = '<span class="spinner"></span>Comparing…';

  try {
    const resp = await fetch('/api/compare', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        schema_type: currentType,
        base_content: getEditorContent('base'),
        head_content: getEditorContent('head'),
      }),
    });

    const data = await resp.json();

    if (!resp.ok) {
      errorBanner.textContent = data.error || 'Unknown error';
      errorBanner.hidden = false;
      return;
    }

    renderResults(data);
  } catch (err) {
    errorBanner.textContent = 'Network error: ' + err.message;
    errorBanner.hidden = false;
  } finally {
    compareBtn.disabled = false;
    compareBtn.textContent = 'Compare';
  }
});

// ── Render results ───────────────────────────────────────────────────────────

function renderResults(data) {
  const { summary, changes } = data;

  const summaryHtml = `
    <div class="summary-bar">
      <h2>Results</h2>
      <span class="pill pill-total">${summary.total} total</span>
      ${summary.breaking > 0    ? `<span class="pill pill-breaking">${summary.breaking} breaking</span>` : ''}
      ${summary.non_breaking > 0 ? `<span class="pill pill-non">${summary.non_breaking} non-breaking</span>` : ''}
      ${summary.info > 0        ? `<span class="pill pill-info">${summary.info} info</span>` : ''}
    </div>`;

  if (!changes || changes.length === 0) {
    resultsEl.innerHTML = summaryHtml + `<div class="no-changes">No changes detected</div>`;
    resultsEl.hidden = false;
    return;
  }

  const rows = changes.map(c => {
    const sevClass = c.severity === 'breaking' ? 'sev-breaking'
                   : c.severity === 'non-breaking' ? 'sev-non-breaking'
                   : 'sev-info';
    const rowClass = c.severity === 'breaking' ? 'row-breaking'
                   : c.severity === 'non-breaking' ? 'row-non-breaking'
                   : 'row-info';
    const method = c.method ? `<span class="td-method">${esc(c.method)}</span> ` : '';
    const beforeAfter = (c.before || c.after)
      ? `<div class="td-before-after">${c.before ? `<s>${esc(c.before)}</s> ` : ''}${c.after ? `→ ${esc(c.after)}` : ''}</div>`
      : '';
    return `
      <tr class="${rowClass}">
        <td><span class="severity-badge ${sevClass}">${esc(c.severity).toUpperCase()}</span></td>
        <td class="td-type">${esc(String(c.type))}</td>
        <td class="td-path">${method}${esc(c.path)}</td>
        <td class="td-desc">${esc(c.description)}${beforeAfter}</td>
      </tr>`;
  }).join('');

  resultsEl.innerHTML = summaryHtml + `
    <div class="changes-table-wrap">
      <table>
        <thead>
          <tr>
            <th>Severity</th>
            <th>Type</th>
            <th>Path</th>
            <th>Description</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;

  resultsEl.hidden = false;
}

function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Init ─────────────────────────────────────────────────────────────────────
initEditors(currentType);
</script>
</body>
</html>
